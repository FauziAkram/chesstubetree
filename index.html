<!DOCTYPE html>
<html>
<head>
    <title>ChessTubeTree</title>
    
    <style>
        /* ====== DEFAULT STYLE: DARK MODE ====== */
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #e0e0e0;
            margin: 40px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            background-color: #2d2d2d;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        th, td {
            padding: 10px 12px;
            border-bottom: 1px solid #444;
            text-align: center;
            font-size: 14px;
        }
        th {
            background-color: #3a7bd5;
            color: white;
            vertical-align: top;
        }
        tr:hover {
            background-color: #3d3d3d;
        }

        /* --- Column Color Coding (Dark Mode) --- */
        .col-main-rating { color: #ffd700; font-weight: bold; font-size: 16px; } /* Gold */
        .col-list-rating { color: #87cefa; } /* Light Blue */
        .col-meta { color: #aaaaaa; } /* Light Grey */
        .col-name { color: #ffffff; font-weight: bold; }

        /* ====== OPTION 2: CLASSIC WOODEN ====== */
        body.wood {
            font-family: "Courier New", Courier, monospace;
            background-color: #e0d0b6; 
            color: #231f20;
        }
        body.wood table { background-color: #fdfdfd; border: 4px solid #4b382a; }
        body.wood th, body.wood td { border-bottom: 1px solid #4b382a; }
        body.wood th { background-color: #4b382a; color: #f3e6d8; }
        body.wood tr:nth-child(even) { background-color: #e6d8c3; }
        body.wood tr:hover { background-color: #d1bfae; }
        
        /* --- Column Color Coding (Wooden Mode) --- */
        body.wood .col-main-rating { color: #800000; font-weight: bold; font-size: 16px; } /* Dark Maroon */
        body.wood .col-list-rating { color: #005f00; font-weight: bold; } /* Dark Green */
        body.wood .col-meta { color: #555555; }
        body.wood .col-name { color: #000000; font-weight: bold; }

        /* --- Custom Checkbox Dropdown Styling --- */
        details.filter-dropdown { position: relative; display: inline-block; margin-top: 8px; font-weight: normal; }
        details.filter-dropdown summary {
            background-color: #444; color: white; padding: 4px 8px;
            border: 1px solid #777; border-radius: 3px; cursor: pointer; font-size: 12px;
        }
        details.filter-dropdown summary:hover { background-color: #555; }
        body.wood details.filter-dropdown summary { background-color: #e6d8c3; color: #231f20; border: 1px solid #4b382a; }
        body.wood details.filter-dropdown summary:hover { background-color: #d1bfae; }
        
        .checkbox-list {
            position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
            background-color: #333; border: 1px solid #777; padding: 10px; z-index: 100;
            text-align: left; min-width: 100px; box-shadow: 0px 4px 8px rgba(0,0,0,0.6); border-radius: 3px; margin-top: 2px;
        }
        body.wood .checkbox-list { background-color: #fdfdfd; border: 2px solid #4b382a; }
        .checkbox-list label { display: block; margin-bottom: 6px; font-size: 13px; color: white; cursor: pointer; white-space: nowrap; }
        body.wood .checkbox-list label { color: #231f20; }

        /* --- Weights Control Panel --- */
        .weights-panel {
            background-color: rgba(0,0,0,0.1); padding: 15px; border-radius: 5px; margin-bottom: 20px;
            display: flex; gap: 15px; align-items: center; flex-wrap: wrap; border: 1px solid #555;
        }
        body.wood .weights-panel { border: 2px dashed #4b382a; }
        .weight-box { display: flex; flex-direction: column; align-items: center; font-size: 13px; }
        .weight-box input { width: 50px; text-align: center; padding: 4px; margin-top: 4px; }
    </style>
</head>
<body>

    <h1>ChessTubeTree</h1>
    <p><strong>Last Update:</strong> May 20, 2024</p>

    <p>
        <label for="themeSelector"><strong>Choose Theme: </strong></label>
        <select id="themeSelector" onchange="changeTheme()">
            <option value="dark">Dark Mode</option>
            <option value="wood">Classic Wooden</option>
        </select>
    </p>

    <!-- WEIGHTS CONTROL PANEL -->
    <div class="weights-panel">
        <strong>Adjust List Weights:</strong>
        <span style="font-size: 12px; opacity: 0.8;">(Set to 0 to ignore a list. Math auto-balances!)</span>
        
        <div class="weight-box">
            <label>CCRL 40/40</label>
            <input type="number" id="w-ccrl4040" value="1" min="0" step="0.5" onchange="calculateRatings()">
        </div>
        <div class="weight-box">
            <label>CCRL Blitz</label>
            <input type="number" id="w-ccrlblitz" value="1" min="0" step="0.5" onchange="calculateRatings()">
        </div>
        <div class="weight-box">
            <label>SP-CC</label>
            <input type="number" id="w-spcc" value="1" min="0" step="0.5" onchange="calculateRatings()">
        </div>
        <div class="weight-box">
            <label>Ipman</label>
            <input type="number" id="w-ipman" value="1" min="0" step="0.5" onchange="calculateRatings()">
        </div>
        <div class="weight-box">
            <label>CEGT</label>
            <input type="number" id="w-cegt" value="1" min="0" step="0.5" onchange="calculateRatings()">
        </div>
    </div>

    <table id="engineTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Main Rating</th>
                <th>Engine Name</th>
                <th>Family <br>
                    <details class="filter-dropdown"><summary>Filter</summary><div class="checkbox-list" id="filter-family"></div></details>
                </th>
                <th>Access <br>
                    <details class="filter-dropdown"><summary>Filter</summary><div class="checkbox-list" id="filter-access"></div></details>
                </th>
                <th>Source <br>
                    <details class="filter-dropdown"><summary>Filter</summary><div class="checkbox-list" id="filter-source"></div></details>
                </th>
                <th>Language <br>
                    <details class="filter-dropdown"><summary>Filter</summary><div class="checkbox-list" id="filter-lang"></div></details>
                </th>
                <th>Eval Type <br>
                    <details class="filter-dropdown"><summary>Filter</summary><div class="checkbox-list" id="filter-eval"></div></details>
                </th>
                <th>Release Year <br>
                    <details class="filter-dropdown"><summary>Filter</summary><div class="checkbox-list" id="filter-year"></div></details>
                </th>
                
                <!-- New Rating List Columns -->
                <th>CCRL 40/40</th>
                <th>CCRL Blitz</th>
                <th>SP-CC</th>
                <th>Ipman</th>
                <th>CEGT</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <script>
        function changeTheme() {
            var selectedTheme = document.getElementById("themeSelector").value;
            if (selectedTheme === "wood") { document.body.className = "wood"; } 
            else { document.body.className = ""; }
        }

        function updateRowNumbers() {
            var table = document.getElementById("engineTable");
            var rows = table.getElementsByTagName("tbody")[0].getElementsByTagName("tr");
            var count = 1;
            for (var i = 0; i < rows.length; i++) {
                if (rows[i].style.display !== "none") {
                    rows[i].getElementsByTagName("td")[0].innerText = count;
                    count++;
                }
            }
        }

        function forceSortByRating() {
            var table = document.getElementById("engineTable");
            var tbody = table.getElementsByTagName("tbody")[0];
            var rowsArray = Array.prototype.slice.call(tbody.getElementsByTagName("tr"));

            rowsArray.sort(function(a, b) {
                // Main rating is now column index 1
                var ratingA = parseInt(a.getElementsByTagName("td")[1].innerText) || 0;
                var ratingB = parseInt(b.getElementsByTagName("td")[1].innerText) || 0;
                return ratingB - ratingA; 
            });

            for (var i = 0; i < rowsArray.length; i++) {
                tbody.appendChild(rowsArray[i]);
            }
            updateRowNumbers();
        }

        function filterTable() {
            var table = document.getElementById("engineTable");
            var rows = table.getElementsByTagName("tbody")[0].getElementsByTagName("tr");
            var filterColumns = [3, 4, 5, 6, 7, 8];

            for (var i = 0; i < rows.length; i++) {
                var showRow = true;
                for (var k = 0; k < filterColumns.length; k++) {
                    var colIndex = filterColumns[k];
                    var cellText = rows[i].getElementsByTagName("td")[colIndex].innerText.trim();
                    var headerCell = table.getElementsByTagName("th")[colIndex];
                    var checkboxes = headerCell.querySelectorAll("input[type='checkbox']");
                    
                    var passedThisFilter = false;
                    for (var c = 0; c < checkboxes.length; c++) {
                        if (checkboxes[c].checked && checkboxes[c].value === cellText) {
                            passedThisFilter = true;
                            break;
                        }
                    }
                    if (!passedThisFilter) { showRow = false; break; }
                }
                rows[i].style.display = showRow ? "" : "none";
            }
            updateRowNumbers();
        }

        // --- NEW: Calculate the weighted average ratings dynamically ---
        function calculateRatings() {
            // Get weights from inputs
            var wCcrl40 = parseFloat(document.getElementById("w-ccrl4040").value) || 0;
            var wCcrlBl = parseFloat(document.getElementById("w-ccrlblitz").value) || 0;
            var wSpcc   = parseFloat(document.getElementById("w-spcc").value) || 0;
            var wIpman  = parseFloat(document.getElementById("w-ipman").value) || 0;
            var wCegt   = parseFloat(document.getElementById("w-cegt").value) || 0;

            var rows = document.querySelectorAll("#engineTable tbody tr");

            rows.forEach(row => {
                var totalScore = 0;
                var totalWeight = 0;

                // Read hidden dataset values stored during CSV load
                var valCcrl40 = parseFloat(row.dataset.ccrl4040);
                var valCcrlBl = parseFloat(row.dataset.ccrlblitz);
                var valSpcc   = parseFloat(row.dataset.spcc);
                var valIpman  = parseFloat(row.dataset.ipman);
                var valCegt   = parseFloat(row.dataset.cegt);

                // If the engine has a rating on a list, add it to the math
                if (!isNaN(valCcrl40)) { totalScore += valCcrl40 * wCcrl40; totalWeight += wCcrl40; }
                if (!isNaN(valCcrlBl)) { totalScore += valCcrlBl * wCcrlBl; totalWeight += wCcrlBl; }
                if (!isNaN(valSpcc))   { totalScore += valSpcc * wSpcc;     totalWeight += wSpcc; }
                if (!isNaN(valIpman))  { totalScore += valIpman * wIpman;   totalWeight += wIpman; }
                if (!isNaN(valCegt))   { totalScore += valCegt * wCegt;     totalWeight += wCegt; }

                var finalRating = (totalWeight > 0) ? Math.round(totalScore / totalWeight) : "N/A";
                
                // Update the Main Rating Cell
                row.getElementsByTagName("td")[1].innerText = finalRating;
            });

            // Re-sort because ratings might have changed!
            forceSortByRating();
        }

        // --- UPDATED: Automatically generate filter checkboxes from CSV data ---
        function populateFilters(colIndex, containerId) {
            var table = document.getElementById("engineTable");
            var rows = table.getElementsByTagName("tbody")[0].getElementsByTagName("tr");
            var uniqueValues = new Set();
            
            for (var i = 0; i < rows.length; i++) {
                uniqueValues.add(rows[i].getElementsByTagName("td")[colIndex].innerText.trim());
            }

            var container = document.getElementById(containerId);
            container.innerHTML = ""; // Clear existing
            
            uniqueValues.forEach(val => {
                var label = document.createElement("label");
                label.innerHTML = `<input type="checkbox" value="${val}" checked onchange="filterTable()"> ${val}`;
                container.appendChild(label);
            });
        }

        // --- UPDATED: Load CSV Data ---
        async function loadCSVData() {
            try {
                const response = await fetch('data.csv');
                if (!response.ok) throw new Error("Network response was not ok");
                
                const csvText = await response.text();
                const lines = csvText.trim().split('\n');
                const tbody = document.querySelector("#engineTable tbody");
                
                for (let i = 1; i < lines.length; i++) {
                    const columns = lines[i].split(',');
                    if (columns.length < 13) continue; // Ensure we have all 13 columns

                    const tr = document.createElement('tr');
                    
                    // Store the rating data invisibly in the row so we can calculate it later
                    tr.dataset.ccrl4040 = columns[8].trim();
                    tr.dataset.ccrlblitz = columns[9].trim();
                    tr.dataset.spcc = columns[10].trim();
                    tr.dataset.ipman = columns[11].trim();
                    tr.dataset.cegt = columns[12].trim();

                    // Create Table Cells dynamically and apply color classes
                    let tds = [
                        { text: "", class: "" }, // 0: #
                        { text: "", class: "col-main-rating" }, // 1: Main Rating (calculated later)
                        { text: columns[1].trim(), class: "col-name" }, // 2: Name
                        { text: columns[2].trim(), class: "col-meta" }, // 3: Family
                        { text: columns[3].trim(), class: "col-meta" }, // 4: Access
                        { text: columns[4].trim(), class: "col-meta" }, // 5: Source
                        { text: columns[5].trim(), class: "col-meta" }, // 6: Language
                        { text: columns[6].trim(), class: "col-meta" }, // 7: Eval Type
                        { text: columns[7].trim(), class: "col-meta" }, // 8: Year
                        { text: columns[8].trim() === "#N/A" ? "-" : columns[8].trim(), class: "col-list-rating" }, // 9: ccrl4040
                        { text: columns[9].trim() === "#N/A" ? "-" : columns[9].trim(), class: "col-list-rating" }, // 10: ccrlblitz
                        { text: columns[10].trim() === "#N/A" ? "-" : columns[10].trim(), class: "col-list-rating" }, // 11: sp-cc
                        { text: columns[11].trim() === "#N/A" ? "-" : columns[11].trim(), class: "col-list-rating" }, // 12: ipman
                        { text: columns[12].trim() === "#N/A" ? "-" : columns[12].trim(), class: "col-list-rating" }  // 13: cegt
                    ];

                    tds.forEach(cell => {
                        const td = document.createElement('td');
                        td.innerText = cell.text;
                        if(cell.class) td.className = cell.class;
                        tr.appendChild(td);
                    });
                    
                    tbody.appendChild(tr);
                }
                
                // Auto-generate filter dropdowns based on the Excel data!
                populateFilters(3, "filter-family");
                populateFilters(4, "filter-access");
                populateFilters(5, "filter-source");
                populateFilters(6, "filter-lang");
                populateFilters(7, "filter-eval");
                populateFilters(8, "filter-year");

                // Calculate ratings and sort
                calculateRatings();
                filterTable();
                
            } catch (error) {
                console.log("Waiting for server hosting!");
                document.querySelector("#engineTable tbody").innerHTML = "<tr><td colspan='14'><i>Data will appear here once the site is hosted on a server!</i></td></tr>";
            }
        }

        window.onload = function() { loadCSVData(); };
    </script>
</body>
</html>
